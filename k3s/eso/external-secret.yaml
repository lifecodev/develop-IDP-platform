apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-token-sync
  namespace: argocd
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: gitlab-token  # Имя секрета, который будет создан в K8s
    creationPolicy: Owner
  data:
  - secretKey: gitlab-token    # Имя ключа в секрете K8s
    remoteRef:
      key: platform/gitlab # Путь к секрету в Vault
      property: argocd-token      # Имя поля (ключа) внутри секрета Vault