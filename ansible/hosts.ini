[infra_lxc]
vault       ansible_host=172.16.30.1
gitlab      ansible_host=172.16.30.2
backstage   ansible_host=172.16.30.3
ansible     ansible_host=172.16.30.5 ansible_connection=local

[k8s_masters]
k8s-master   ansible_host=172.16.100.1

[k8s_workers]
k8s-worker1  ansible_host=172.16.100.2
k8s-worker2  ansible_host=172.16.100.3

[runners]
gitlab-runner ansible_host=172.16.100.4

# Настройки подключения для группы LXC-контейнеров
[infra_lxc:vars]
ansible_user=root

# Настройки подключения для виртуалок KVM
[k8s_masters:vars]
ansible_user=ubuntu
ansible_become=yes
ansible_become_method=sudo

[k8s_workers:vars]
ansible_user=ubuntu
ansible_become=yes
ansible_become_method=sudo

[runners:vars]
ansible_user=ubuntu
ansible_become=yes
ansible_become_method=sudo

# Глобальные переменные для вообще всех хостов
[all:vars]
ansible_ssh_private_key_file=/root/.ssh/id_rsa
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
