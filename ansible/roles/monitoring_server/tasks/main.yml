---
- name: Установка базовых системных зависимостей
  apt:
    name:
      - prometheus
      - wget
    state: present
    update_cache: yes

- name: Скачивание актуального DEB-пакета Grafana 11.x
  get_url:
    url: https://dl.grafana.com/oss/release/grafana_11.5.2_amd64.deb
    dest: /tmp/grafana_amd64.deb
    mode: '0644'

- name: Установка Grafana из скачанного локального пакета
  apt:
    deb: /tmp/grafana_amd64.deb
    state: present

- name: Удаление временного установочного DEB-пакета
  file:
    path: /tmp/grafana_amd64.deb
    state: absent

- name: Генерация и деплой конфигурационного файла Prometheus
  template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    owner: prometheus
    group: prometheus
    mode: '0644'
  notify: Restart Prometheus

- name: Обеспечение автозапуска и работы служб мониторинга
  systemd:
    name: "{{ item }}"
    state: started
    enabled: yes
  loop:
    - prometheus
    - grafana-server